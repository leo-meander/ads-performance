# Daily 05:00 UTC — Creative Library combo metrics (ad-level Meta spend/ROAS/
# CPP/CTR/hook rate). Runs after the 03:00 Ads Platform sync so any new combo
# rows exist first. 45-day rolling window; metrics are overwritten per combo
# so overlapping runs never double-count.
name: Cron — Creative combo metrics

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

env:
  BACKEND_URL: https://ads-performance-fuls.zeabur.app
  ENDPOINT: sync-combo-metrics

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/internal/tasks/sync-combo-metrics
        env:
          INTERNAL_TASK_SECRET: ${{ secrets.INTERNAL_TASK_SECRET }}
        run: |
          set -euo pipefail
          echo "Triggering endpoint: $ENDPOINT"
          HTTP_CODE=$(curl -s -o /tmp/body.txt -w "%{http_code}" \
            -X POST \
            -H "X-Internal-Secret: $INTERNAL_TASK_SECRET" \
            "$BACKEND_URL/api/internal/tasks/$ENDPOINT")
          echo "HTTP $HTTP_CODE"
          cat /tmp/body.txt || true
          echo
          if [ "$HTTP_CODE" != "202" ]; then
            echo "::error::endpoint $ENDPOINT returned HTTP $HTTP_CODE"
            exit 1
          fi
