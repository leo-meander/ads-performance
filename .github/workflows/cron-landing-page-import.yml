# Every 4h at :30 — refresh landing_page_ad_links by matching
# Clarity-observed utm_campaign values to Campaign.name. Idempotent
# (safe to re-run).
#
# Hourly was overkill: upstream Clarity sync only runs once daily at
# 02:00 UTC and ads sync 2x daily. 4-hour cadence still catches new
# utm_campaign hits within the same business day.
name: Cron — Landing page import

on:
  schedule:
    - cron: "30 */4 * * *"
  workflow_dispatch:

env:
  BACKEND_URL: https://ads-performance-fuls.zeabur.app
  ENDPOINT: landing-page-import

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/internal/tasks/landing-page-import
        env:
          INTERNAL_TASK_SECRET: ${{ secrets.INTERNAL_TASK_SECRET }}
        run: |
          set -euo pipefail
          echo "Triggering endpoint: $ENDPOINT"
          HTTP_CODE=$(curl -s -o /tmp/body.txt -w "%{http_code}" \
            -X POST \
            -H "X-Internal-Secret: $INTERNAL_TASK_SECRET" \
            "$BACKEND_URL/api/internal/tasks/$ENDPOINT")
          echo "HTTP $HTTP_CODE"
          cat /tmp/body.txt || true
          echo
          if [ "$HTTP_CODE" != "202" ]; then
            echo "::error::endpoint $ENDPOINT returned HTTP $HTTP_CODE"
            exit 1
          fi
