# Manual only — Meta Ads recommendation engine (monthly cadence).
#
# Schedule disabled May 2026: Meta CATALOG has zero _MONTHLY detectors
# (every RecTypeSpec in meta_recommendations/catalog.py uses _DAILY |
# _WEEKLY | _SEASON). Engine would just log "no detectors for
# cadence=monthly" and return. Re-enable the schedule below if a Meta
# monthly detector is added to the catalog.
name: Cron — Meta recs (monthly)

on:
  workflow_dispatch:

env:
  BACKEND_URL: https://ads-performance-fuls.zeabur.app
  ENDPOINT: meta-recommendations/monthly

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/internal/tasks/meta-recommendations/monthly
        env:
          INTERNAL_TASK_SECRET: ${{ secrets.INTERNAL_TASK_SECRET }}
        run: |
          set -euo pipefail
          echo "Triggering endpoint: $ENDPOINT"
          HTTP_CODE=$(curl -s -o /tmp/body.txt -w "%{http_code}" \
            -X POST \
            -H "X-Internal-Secret: $INTERNAL_TASK_SECRET" \
            "$BACKEND_URL/api/internal/tasks/$ENDPOINT")
          echo "HTTP $HTTP_CODE"
          cat /tmp/body.txt || true
          echo
          if [ "$HTTP_CODE" != "202" ]; then
            echo "::error::endpoint $ENDPOINT returned HTTP $HTTP_CODE"
            exit 1
          fi
