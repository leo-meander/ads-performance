# Daily 01:00 UTC = 08:00 VN — deep-refresh sync-backfill (1-month window).
# Tier-2 catch-up for offline conversion uploads and late attribution
# adjustments that arrive past the regular sync. 30 days covers Meta's
# longest attribution window (28d). Runs an hour after the 07:00 VN
# Ads Platform sync so the morning numbers are fully settled.
name: Cron — Sync backfill (daily)

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

env:
  BACKEND_URL: https://ads-performance-fuls.zeabur.app
  ENDPOINT: sync-backfill?months_back=1

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/internal/tasks/sync-backfill
        env:
          INTERNAL_TASK_SECRET: ${{ secrets.INTERNAL_TASK_SECRET }}
        run: |
          set -euo pipefail
          echo "Triggering endpoint: $ENDPOINT"
          HTTP_CODE=$(curl -s -o /tmp/body.txt -w "%{http_code}" \
            -X POST \
            -H "X-Internal-Secret: $INTERNAL_TASK_SECRET" \
            "$BACKEND_URL/api/internal/tasks/$ENDPOINT")
          echo "HTTP $HTTP_CODE"
          cat /tmp/body.txt || true
          echo
          if [ "$HTTP_CODE" != "202" ]; then
            echo "::error::endpoint $ENDPOINT returned HTTP $HTTP_CODE"
            exit 1
          fi
